# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "467a35771c52d0c84cbe8c225fbb9da8"
name = "PWC : Order Editor"
application_url = "https://order-editor.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Keep in sync with `resolveScopes()` in app/shopify.server.js (`fileCreate` needs write_files).
scopes = "read_files,write_files,write_products,read_orders,write_orders,read_customers,write_order_edits"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://order-editor.vercel.app" ]
