# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "467a35771c52d0c84cbe8c225fbb9da8"
name = "pwc-order-editor"
application_url = "https://order-editor.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://order-editor.vercel.app/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://order-editor.vercel.app/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://order-editor.vercel.app" ]
